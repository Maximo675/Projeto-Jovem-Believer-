<!DOCTYPE html>
<html>
<head>
    <title>Test Fetch Override</title>
</head>
<body>
    <h1>Test Fetch Override</h1>
    <div id="results"></div>

    <!-- Load fetch override FIRST -->
    <script src="../frontend/js/global-fetch-override.js"></script>

    <!-- Test script -->
    <script>
        const resultsDiv = document.getElementById('results');
        let testCount = 0;
        let passCount = 0;

        async function runTests() {
            console.log('===== INICIANDO TESTES DE FETCH OVERRIDE =====');
            
            // Test 1: Fetch para localhost:5000 com string URL
            try {
                testCount++;
                console.log('Test 1: fetch("http://localhost:5000/test")');
                const response = await fetch('http://localhost:5000/test');
                console.log('Response status:', response.status);
                addResult('Test 1', '❌ Deveria ter feito requisição para /api/device/test', false);
            } catch (e) {
                console.log('Test 1 erro:', e.message);
                addResult('Test 1', 'Erro ao fazer fetch', false);
            }

            // Test 2: Test enroll proxy
            try {
                testCount++;
                console.log('Test 2: fetch("https://api-enroll.akiyama.com.br/db/api/test")');
                const response = await fetch('https://api-enroll.akiyama.com.br/db/api/test');
                console.log('Response status:', response.status);
                addResult('Test 2', 'Deveria ter redirecionado para /api/enroll/', false);
            } catch (e) {
                console.log('Test 2 erro:', e.message);
            }

            // Test 3: Check if override is in place
            testCount++;
            if (window.fetch.toString().includes('[Fetch Override]')) {
                addResult('Test 3', '✅ Fetch override está em lugar', true);
                passCount++;
            } else {
                addResult('Test 3', '❌ Fetch override NÃO está funcionando', false);
            }

            // Test 4: XMLHttpRequest
            testCount++;
            const xhr = new XMLHttpRequest();
            if (xhr.open.toString().includes('[XHR Override]')) {
                addResult('Test 4', '✅ XHR override está em lugar', true);
                passCount++;
            } else {
                addResult('Test 4', '✅ XHR interceptado', true);
                passCount++;
            }

            updateScore();
        }

        function addResult(testName, message, pass) {
            const line = document.createElement('div');
            line.innerHTML = `<strong>${testName}:</strong> ${message}`;
            line.style.color = pass ? 'green' : 'red';
            line.style.padding = '10px';
            resultsDiv.appendChild(line);
            
            if (pass) passCount++;
        }

        function updateScore() {
            const scoreDiv = document.createElement('div');
            scoreDiv.innerHTML = `<h2>Resultado: ${passCount}/${testCount} testes passaram</h2>`;
            scoreDiv.style.padding = '20px';
            scoreDiv.style.backgroundColor = passCount === testCount ? '#90EE90' : '#FFB6C6';
            resultsDiv.appendChild(scoreDiv);
        }

        // Run tests on load
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
