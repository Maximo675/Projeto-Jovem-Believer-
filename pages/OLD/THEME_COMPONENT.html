<!-- 
    COMPONENTE REUTILIZÁVEL: Seletor de Tema para Navbar
    
    Copie este código para sua navbar e adapte conforme necessário
-->

<!-- Incluir no <head> do seu HTML -->
<link rel="stylesheet" href="../css/theme-controls.css">
<script src="../js/theme.js"></script>

<!-- Incluir na navbar (próximo ao menu de navegação) -->
<div class="theme-dropdown" id="navThemeDropdown" style="display: inline-block;">
    <button class="theme-dropdown-btn" onclick="toggleNavThemeDropdown()">
        🎨 Tema
    </button>
    <div class="theme-dropdown-menu">
        <div class="theme-dropdown-item" onclick="selectNavTheme('dark')">
            <span class="theme-icon">🌙</span>
            <span>Escuro</span>
        </div>
        <div class="theme-dropdown-item" onclick="selectNavTheme('light')">
            <span class="theme-icon">☀️</span>
            <span>Claro</span>
        </div>
        <div class="theme-dropdown-item" onclick="selectNavTheme('alternative')">
            <span class="theme-icon">🎨</span>
            <span>Alternativo</span>
        </div>
    </div>
</div>

<!-- Script para o componente -->
<script>
    // Inicializar item ativo
    document.addEventListener('DOMContentLoaded', () => {
        updateNavThemeUI();
    });

    // Atualizar UI quando tema muda
    window.addEventListener('themeChanged', () => {
        updateNavThemeUI();
    });

    function toggleNavThemeDropdown() {
        const dropdown = document.getElementById('navThemeDropdown');
        dropdown.classList.toggle('active');
    }

    function selectNavTheme(theme) {
        ThemeManager.setTheme(theme);
        document.getElementById('navThemeDropdown').classList.remove('active');
        updateNavThemeUI();
    }

    function updateNavThemeUI() {
        const currentTheme = ThemeManager.getTheme();
        document.querySelectorAll('#navThemeDropdown .theme-dropdown-item').forEach(item => {
            item.classList.remove('active');
        });
        const activeItem = document.querySelector(
            `#navThemeDropdown .theme-dropdown-item[onclick*="selectNavTheme('${currentTheme}')"]`
        );
        if (activeItem) activeItem.classList.add('active');
    }

    // Fechar dropdown ao clicar fora
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('navThemeDropdown');
        const btn = dropdown.querySelector('.theme-dropdown-btn');
        if (!dropdown.contains(e.target) && e.target !== btn) {
            dropdown.classList.remove('active');
        }
    });
</script>
